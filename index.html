/* ===========================================================
   Rasaia Clean AI — Design System
   Premium SaaS aesthetic · deep blue · clean white
   =========================================================== */

:root {
  /* Brand blues */
  --blue-50:  #EEF3FF;
  --blue-100: #DDE6FF;
  --blue-200: #BFD0FF;
  --blue-300: #93AEFF;
  --blue-400: #5E82F6;
  --blue-500: #3A60EC;
  --blue-600: #2347D9;   /* primary */
  --blue-700: #1B37B4;
  --blue-800: #18308F;
  --blue-900: #142663;
  --navy:     #0B1734;   /* deepest brand navy */

  /* AI accent (violet-leaning) */
  --ai-500: #6E59F2;
  --ai-100: #ECE8FF;

  /* Success / status */
  --green-600: #0E9F6E;
  --green-100: #DDF6EC;
  --amber-600: #C2810A;
  --amber-100: #FBF1D8;
  --red-600:   #D64550;
  --red-100:   #FBE3E5;

  /* Neutrals (cool, subtly toned) */
  --ink:    #0C1526;   /* primary text */
  --ink-2:  #33415C;   /* secondary text */
  --ink-3:  #67748C;   /* tertiary / captions */
  --line:   #E4E9F2;   /* hairlines */
  --line-2: #EEF1F7;
  --surface:    #FFFFFF;
  --surface-2:  #F7F9FC;  /* page bg */
  --surface-3:  #F1F4FA;  /* inset */

  /* Radii */
  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 30px;
  --r-pill: 999px;

  /* Shadows — soft, layered, premium */
  --sh-xs: 0 1px 2px rgba(12,21,38,.06);
  --sh-sm: 0 2px 6px rgba(12,21,38,.06), 0 1px 2px rgba(12,21,38,.05);
  --sh-md: 0 6px 18px rgba(12,21,38,.08), 0 2px 6px rgba(12,21,38,.05);
  --sh-lg: 0 18px 44px rgba(12,21,38,.12), 0 6px 14px rgba(12,21,38,.07);
  --sh-xl: 0 34px 80px rgba(11,23,52,.20), 0 10px 24px rgba(12,21,38,.10);
  --sh-blue: 0 12px 30px rgba(35,71,217,.30);

  --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "Geist Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --maxw: 1200px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font);
  color: var(--ink);
  background: var(--surface-2);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#root { min-height: 100vh; }

h1, h2, h3, h4, h5, p { margin: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

::selection { background: var(--blue-200); }

/* Scrollbar */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: #D3DAE8; border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: #BCC6D9; background-clip: padding-box; border: 2px solid transparent; }

/* ---------- Typographic helpers ---------- */
.eyebrow {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--blue-600);
}
.mono { font-family: var(--mono); }
.t-display { font-size: 60px; line-height: 1.04; font-weight: 800; letter-spacing: -.025em; }
.t-h1 { font-size: 40px; line-height: 1.1; font-weight: 800; letter-spacing: -.02em; }
.t-h2 { font-size: 28px; line-height: 1.18; font-weight: 700; letter-spacing: -.015em; }
.t-h3 { font-size: 21px; line-height: 1.25; font-weight: 700; letter-spacing: -.01em; }
.muted { color: var(--ink-3); }
.lead { font-size: 18px; line-height: 1.6; color: var(--ink-2); }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  font-weight: 600; font-size: 15px; line-height: 1;
  padding: 0 20px; height: 46px; border-radius: var(--r-pill);
  transition: transform .12s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
  white-space: nowrap; user-select: none;
}
.btn:active { transform: translateY(1px) scale(.99); }
.btn-primary { background: var(--blue-600); color: #fff; box-shadow: var(--sh-blue); }
.btn-primary:hover { background: var(--blue-700); box-shadow: 0 14px 34px rgba(35,71,217,.40); }
.btn-dark { background: var(--navy); color: #fff; box-shadow: var(--sh-md); }
.btn-dark:hover { background: #122046; }
.btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); box-shadow: var(--sh-xs); }
.btn-ghost:hover { border-color: #CFD8E8; background: var(--surface-2); }
.btn-soft { background: var(--blue-50); color: var(--blue-700); }
.btn-soft:hover { background: var(--blue-100); }
.btn-lg { height: 54px; font-size: 16px; padding: 0 28px; }
.btn-sm { height: 38px; font-size: 13.5px; padding: 0 15px; }
.btn-block { width: 100%; }

/* ---------- Cards ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-sm);
}

/* ---------- Badges ---------- */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; font-weight: 600; padding: 4px 11px; border-radius: var(--r-pill);
  line-height: 1.3;
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; }
.badge-blue  { background: var(--blue-50);  color: var(--blue-700); }
.badge-green { background: var(--green-100); color: var(--green-600); }
.badge-amber { background: var(--amber-100); color: var(--amber-600); }
.badge-red   { background: var(--red-100);   color: var(--red-600); }
.badge-gray  { background: var(--surface-3); color: var(--ink-2); }
.badge-ai    { background: var(--ai-100);    color: var(--ai-500); }

/* ---------- Form fields ---------- */
.field-label { font-size: 13.5px; font-weight: 600; color: var(--ink-2); margin-bottom: 8px; display: block; }
.input, .select {
  width: 100%; height: 50px; padding: 0 16px;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  background: var(--surface); color: var(--ink); font-size: 15px;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.input:focus, .select:focus { border-color: var(--blue-400); box-shadow: 0 0 0 4px var(--blue-50); }
.input::placeholder { color: var(--ink-3); }

/* ---------- Animations ---------- */
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
@keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
@keyframes popCheck { 0% { transform: scale(.6); } 60% { transform: scale(1.12); } 100% { transform: scale(1); } }
@keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
@keyframes ringPulse { 0% { box-shadow: 0 0 0 0 rgba(35,71,217,.35);} 70%{ box-shadow: 0 0 0 14px rgba(35,71,217,0);} 100%{ box-shadow:0 0 0 0 rgba(35,71,217,0);} }

/* Entrance classes stay fully visible by default. Some preview/capture
   environments pause CSS animations at frame 0 — gating visibility on an
   opacity-from-0 animation would leave content invisible there. We keep a
   gentle, safe transform-only lift that can never hide content. */
.fade-up, .fade-in, .scale-in { opacity: 1; }
@media (prefers-reduced-motion: no-preference) {
  .fade-up { animation: liftIn .5s cubic-bezier(.2,.7,.3,1) both; }
  .scale-in { animation: liftIn .42s cubic-bezier(.2,.7,.3,1) both; }
}
@keyframes liftIn { from { transform: translateY(10px); } to { transform: none; } }

/* ---------- Utility ---------- */
.row { display: flex; align-items: center; }
.col { display: flex; flex-direction: column; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-5 { gap: 20px; } .gap-6 { gap: 24px; }
.grow { flex: 1; }
.wrap { flex-wrap: wrap; }
.container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }

.skeleton-line {
  background: linear-gradient(90deg, #EEF1F7 25%, #E4E9F2 37%, #EEF1F7 63%);
  background-size: 800px 100%; animation: shimmer 1.4s infinite linear;
  border-radius: 6px;
}

/* ---------- RTL (Arabic) ---------- */
[dir="rtl"] body, [dir="rtl"] { text-align: right; }
/* Mirror directional chevrons/arrows so "next/back" point the right way */

[dir="rtl"] svg path[d^="M19 12H5"] { /* fallback; handled by class below */ }
[dir="rtl"] .flip-rtl { transform: scaleX(-1); }
/* Range slider direction */
[dir="rtl"] input[type="range"] { direction: rtl; }
/* Keep monospace refs / phone numbers / prices LTR for legibility */
[dir="rtl"] .mono, [dir="rtl"] .keep-ltr { direction: ltr; unicode-bidi: embed; }
[dir="rtl"] .mono { text-align: inherit; }

const DICTS = { en: {}, ar: AR };

const LangCtx = createContext({ lang: "en", setLang: () => {}, t: (s) => s, dir: "ltr", isRTL: false });

function LangProvider({ children }) {
  const [lang, setLangState] = useState(() => {
    try { return localStorage.getItem("rasaia_lang") || "en"; } catch (e) { return "en"; }
  });
  const isRTL = lang === "ar";
  const dir = isRTL ? "rtl" : "ltr";

  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = dir;
    try { localStorage.setItem("rasaia_lang", lang); } catch (e) {}
  }, [lang, dir]);

  const setLang = (l) => setLangState(l);
  const t = (s) => {
    if (lang === "en") return s;
    const d = DICTS[lang] || {};
    return Object.prototype.hasOwnProperty.call(d, s) ? d[s] : s;
  };

  return <LangCtx.Provider value={{ lang, setLang, t, dir, isRTL }}>{children}</LangCtx.Provider>;
}

function useLang() { return useContext(LangCtx); }

/* ---- Language toggle (segmented EN | ع) ---- */
function LanguageToggle({ compact }) {
  const { lang, setLang } = useLang();
  const opts = [{ k: "en", label: "EN" }, { k: "ar", label: "ع" }];
  return (
    <div className="row" style={{ background: "var(--surface-2)", border: "1px solid var(--line)", borderRadius: 999, padding: 3, gap: 2, height: compact ? 38 : 42 }}>
      {opts.map(o => {
        const active = lang === o.k;
        return (
          <button key={o.k} onClick={() => setLang(o.k)} aria-label={o.k === "en" ? "English" : "Arabic"} style={{
            height: "100%", padding: "0 13px", borderRadius: 999, fontSize: 13.5, fontWeight: 700,
            fontFamily: o.k === "ar" ? "var(--font)" : "inherit",
            background: active ? "var(--blue-600)" : "transparent", color: active ? "#fff" : "var(--ink-2)",
            transition: "background .15s, color .15s",
          }}>{o.label}</button>
        );
      })}
    </div>
  );
}

Object.assign(window, { LangProvider, useLang, LanguageToggle });

/* ============================================================

const CURRENCY = "AED";
const fmt = (n) => CURRENCY + " " + Math.round(n).toLocaleString("en-US");

/* ---------- Service catalog ---------- */
const SERVICES = {
  regular:   { key: "regular",   name: "Regular Cleaning",        blurb: "Routine upkeep of living spaces and surfaces.",            rate: 0.85, hours: 1.0, complexity: "Standard" },
  deep:      { key: "deep",      name: "Deep Cleaning",           blurb: "Detailed top-to-bottom clean incl. build-up and grime.",  rate: 1.55, hours: 1.7, complexity: "Elevated" },
  moveout:   { key: "moveout",   name: "Move-Out Cleaning",       blurb: "Handover-ready clean for tenancy and inspections.",       rate: 1.85, hours: 2.0, complexity: "High"     },
  postreno:  { key: "postreno",  name: "Post-Renovation Cleaning",blurb: "Dust, debris and residue removal after construction.",    rate: 2.35, hours: 2.5, complexity: "Intensive"},
};

const PROPERTY_TYPES = [
  { key: "apartment", label: "Apartment",  icon: "building" },
  { key: "villa",     label: "Villa",      icon: "home" },
  { key: "townhouse", label: "Townhouse",  icon: "townhouse" },
  { key: "office",    label: "Office",     icon: "briefcase" },
];

const CLEANING_TYPES = [
  { key: "regular",  label: "Regular Cleaning",         desc: "Maintenance clean for lived-in homes" },
  { key: "deep",     label: "Deep Cleaning",            desc: "Thorough detail clean, every surface" },
  { key: "moveout",  label: "Move-Out Cleaning",        desc: "Inspection-ready handover clean" },
  { key: "postreno", label: "Post-Renovation Cleaning", desc: "Dust & debris removal after works" },
];

const PHOTO_ROOMS = [
  { key: "living",   label: "Living Room", hint: "Sofas, floors, surfaces" },
  { key: "kitchen",  label: "Kitchen",     hint: "Counters, appliances, sink" },
  { key: "bathroom", label: "Bathroom",    hint: "Tiles, fixtures, grout" },
  { key: "bedroom",  label: "Bedroom",     hint: "Floors, wardrobes, dust" },
  { key: "extra",    label: "Additional",  hint: "Balcony, hallway, other" },
];

/* ---------- The estimation engine ---------- */
function estimate(input) {
  const { propertyType = "apartment", size = 1100, bedrooms = 2, bathrooms = 2, cleaningType = "deep", photoCount = 0 } = input || {};
  const svc = SERVICES[cleaningType] || SERVICES.deep;

  // size-driven base, with room loading
  const roomLoad = bedrooms * 55 + bathrooms * 90;
  const effSize = Math.max(size, 350) + roomLoad;

  // labor hours
  let hours = (effSize / 240) * svc.hours;
  if (propertyType === "villa") hours *= 1.18;
  if (propertyType === "office") hours *= 0.92;
  hours = Math.max(2, hours);

  // team size
  let team = 1;
  if (hours > 4) team = 2;
  if (hours > 8) team = 3;
  if (hours > 13) team = 4;
  const perPerson = hours / team;
  const durationHours = Math.max(1.5, perPerson);

  // price
  const labor = effSize * svc.rate;
  const typeMult = propertyType === "villa" ? 1.15 : propertyType === "office" ? 1.05 : 1;
  const mid = labor * typeMult * 1.0;
  const low = mid * 0.9;
  const high = mid * 1.14;

  // confidence — more photos & moderate size = higher confidence
  let confidence = 78;
  confidence += Math.min(photoCount, 8) * 1.6;
  if (bedrooms <= 4 && bathrooms <= 4) confidence += 4;
  if (cleaningType === "regular") confidence += 3;
  confidence = Math.min(97, Math.round(confidence));

  const reasoning = [
    { t: "Property profile", d: `${PROPERTY_TYPES.find(p=>p.key===propertyType)?.label || "Property"} · ${size.toLocaleString()} sq ft · ${bedrooms} bed / ${bathrooms} bath. Adjusted workload of ${Math.round(effSize).toLocaleString()} effective sq ft after room weighting.` },
    { t: "Complexity class", d: `Classified as ${svc.complexity.toLowerCase()} complexity for ${svc.name.toLowerCase()}. ${cleaningType === "postreno" ? "Construction residue requires specialist dust extraction." : cleaningType === "moveout" ? "Inspection-grade finish across all fixtures." : cleaningType === "deep" ? "Detailing of grout, appliances and high-touch zones included." : "Standard surface maintenance across living areas."}` },
    { t: "Labor & duration", d: `Estimated ${hours.toFixed(1)} total labor hours, completed in ~${durationHours.toFixed(1)}h with a team of ${team}.` },
    { t: "Photo signals", d: photoCount > 0 ? `Analyzed ${photoCount} uploaded photo${photoCount>1?"s":""}; detected typical soiling consistent with the selected service.` : "No photos provided — estimate based on property data alone. Adding photos raises confidence." },
  ];

  return {
    service: svc,
    cleaningType,
    durationHours: Math.round(durationHours * 2) / 2,
    totalHours: Math.round(hours * 2) / 2,
    team,
    priceLow: low, priceHigh: high, priceMid: mid,
    confidence,
    complexity: svc.complexity,
    reasoning,
    input: { propertyType, size, bedrooms, bathrooms, cleaningType },
  };
}

/* ---------- AI assistant canned answers ---------- */
function assistantAnswer(q, est) {
  const key = q.toLowerCase();
  if (key.includes("service") || key.includes("recommend"))
    return `I recommended **${est.service.name}** because your inputs point to ${est.complexity.toLowerCase()} complexity. ${est.service.blurb} Based on the property size and room count, a lighter service would likely leave detailing gaps, while a heavier one would over-scope and raise the price unnecessarily.`;
  if (key.includes("cleaner") || key.includes("team") || key.includes("2 ") || key.includes("staff"))
    return `Your job is estimated at **${est.totalHours} total labor hours**. To finish within a single ~${est.durationHours}h window, I've assigned a team of **${est.team}**. Fewer cleaners would stretch the job across a longer day; more would idle. This balances speed and cost.`;
  if (key.includes("calculate") || key.includes("estimate calc") || key.includes("how was"))
    return `The estimate combines three signals: (1) effective area after weighting your ${est.input.bedrooms} bedrooms and ${est.input.bathrooms} bathrooms, (2) a per-sq-ft rate for ${est.service.name.toLowerCase()}, and (3) a property-type multiplier. That yields a midpoint of ${fmt(est.priceMid)}, presented as a ${fmt(est.priceLow)}–${fmt(est.priceHigh)} range to absorb on-site variation.`;
  if (key.includes("reduce") || key.includes("cheaper") || key.includes("lower"))
    return `A few ways to bring the estimate down: switch from ${est.service.name} to a lighter service tier, exclude rooms that don't need attention, or book a recurring plan for a loyalty rate. Want me to re-price a Regular Cleaning for comparison?`;
  return `Good question. This estimate is generated from your property details and photo signals. The recommended ${est.service.name.toLowerCase()} runs ~${est.durationHours}h with a team of ${est.team}, priced ${fmt(est.priceLow)}–${fmt(est.priceHigh)} at ${est.confidence}% confidence. Ask me about the service choice, team size, pricing, or how to reduce it.`;
}

function Icon({ name, size = 20, stroke = 2, className = "", style = {} }) {
  const d = PATHS[name];
  const directional = name === "arrowRight" || name === "arrowLeft" || name === "send";
  const cls = (directional ? "flip-rtl " : "") + className;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
      className={cls} style={style} aria-hidden="true">
      {d.split(" M").map((seg, i) => <path key={i} d={(i === 0 ? "" : "M") + seg} />)}
    </svg>
  );
}

/* ---------------- Badge ---------------- */
function Badge({ children, kind = "gray", dot = false }) {

/* ---------------- Progress steps (customer wizard) ---------------- */
function ProgressSteps({ steps, current }) {
  return (
    <div className="row" style={{ gap: 0, alignItems: "center" }}>
      {steps.map((s, i) => {
        const done = i < current, active = i === current;
        return (
          <React.Fragment key={s}>
            <div className="row gap-2" style={{ alignItems: "center" }}>
              <div style={{
                width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                display: "grid", placeItems: "center", fontSize: 12.5, fontWeight: 700,
                background: done ? "var(--blue-600)" : active ? "var(--blue-600)" : "var(--surface-3)",
                color: done || active ? "#fff" : "var(--ink-3)",
                border: active ? "3px solid var(--blue-100)" : "none",
                transition: "all .25s",
              }}>
                {done ? <Icon name="check" size={14} stroke={3} /> : i + 1}
              </div>
              <span style={{ fontSize: 13, fontWeight: active ? 700 : 500, color: active ? "var(--ink)" : "var(--ink-3)", whiteSpace: "nowrap" }}>{s}</span>
            </div>
            {i < steps.length - 1 && (
              <div style={{ flex: 1, height: 2, margin: "0 12px", minWidth: 18,
                background: done ? "var(--blue-300)" : "var(--line)", borderRadius: 2, transition: "background .25s" }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ---------------- Confidence ring ---------------- */
function ConfidenceRing({ value, size = 132 }) {
  const r = (size - 16) / 2, c = 2 * Math.PI * r;
  const shown = value;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface-3)" strokeWidth="9" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#cg)" strokeWidth="9" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={c - (shown/100)*c} style={{ transition: "stroke-dashoffset .1s" }} />
        <defs><linearGradient id="cg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="var(--blue-500)" /><stop offset="1" stopColor="var(--ai-500)" /></linearGradient></defs>
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center" }}>
        <div>
          <div style={{ fontSize: size * 0.27, fontWeight: 800, letterSpacing: "-.02em", lineHeight: 1 }}>{shown}<span style={{ fontSize: size*0.13 }}>%</span></div>
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-3)", letterSpacing: ".1em", marginTop: 4 }}>CONFIDENCE</div>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Stat / metric card ---------------- */
function StatCard({ icon, label, value, delta, deltaTone = "green", accent = "var(--blue-600)", sub }) {
  return (
    <div className="card" style={{ padding: 22, display: "flex", flexDirection: "column", gap: 14 }}>

        {sub && <div className="muted" style={{ fontSize: 12, marginTop: 2 }}>{sub}</div>}

}

/* ---------------- Photo placeholder tile (striped) ---------------- */

/* ============================================================
   Rasaia Clean AI — Professional PDF quote export (jsPDF)
   Business documents render in English for font reliability.
   ============================================================ */

function generateQuotePDF(est, ref) {
  const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
  if (!jsPDFCtor) { alert("PDF library is still loading — please try again in a moment."); return; }

  const doc = new jsPDFCtor({ unit: "pt", format: "a4" });
  const W = doc.internal.pageSize.getWidth();   // 595
  const M = 48;                                  // margin
  const NAVY = [11, 23, 52], BLUE = [35, 71, 217], INK = [12, 21, 38], INK3 = [103, 116, 140], LINE = [228, 233, 242];
  const money = (n) => "AED " + Math.round(n).toLocaleString("en-US");
  const pt = (Rasaia.PROPERTY_TYPES.find(p => p.key === est.input.propertyType) || {}).label || "Property";

  /* ---- Header band ---- */
  doc.setFillColor(...NAVY); doc.rect(0, 0, W, 108, "F");
  doc.setFillColor(...BLUE); doc.roundedRect(M, 34, 34, 34, 8, 8, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "bold"); doc.setFontSize(11);
  doc.text("R", M + 17, 56, { align: "center" });
  doc.setFontSize(17); doc.text("Rasaia Clean AI", M + 46, 50);
  doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(180, 195, 230);
  doc.text("AI CLEANING QUOTATION", M + 46, 66);
  doc.setFontSize(9); doc.setTextColor(210, 220, 245);
  doc.text("Reference", W - M, 46, { align: "right" });
  doc.setFont("helvetica", "bold"); doc.setFontSize(13); doc.setTextColor(255, 255, 255);
  doc.text(ref, W - M, 62, { align: "right" });

  let y = 150;
  const label = (txt, yy) => { doc.setFont("helvetica", "bold"); doc.setFontSize(8.5); doc.setTextColor(...INK3); doc.text(txt.toUpperCase(), M, yy); };
  const rule = (yy) => { doc.setDrawColor(...LINE); doc.setLineWidth(1); doc.line(M, yy, W - M, yy); };

  /* ---- Recommended service ---- */
  label("Recommended service", y);
  doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(...INK);
  doc.text(est.service.name, M, y + 26);
  doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(...INK3);
  doc.text(doc.splitTextToSize(est.service.blurb, W - 2 * M - 130), M, y + 46);

  // confidence chip (right)
  doc.setFillColor(238, 243, 255); doc.roundedRect(W - M - 120, y - 6, 120, 50, 10, 10, "F");
  doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(...BLUE);
  doc.text(est.confidence + "%", W - M - 60, y + 20, { align: "center" });
  doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(...INK3);
  doc.text("AI CONFIDENCE", W - M - 60, y + 34, { align: "center" });

  y += 78; rule(y); y += 28;

  /* ---- Metric row: duration / team / complexity ---- */
  const metrics = [
    ["Estimated duration", "~" + est.durationHours + " hrs"],
    ["Recommended team", est.team + (est.team > 1 ? " cleaners" : " cleaner")],
    ["Complexity", est.complexity],
  ];
  const colW = (W - 2 * M) / 3;
  metrics.forEach((m, i) => {
    const x = M + i * colW;
    doc.setFont("helvetica", "normal"); doc.setFontSize(8.5); doc.setTextColor(...INK3);
    doc.text(m[0].toUpperCase(), x, y);
    doc.setFont("helvetica", "bold"); doc.setFontSize(15); doc.setTextColor(...INK);
    doc.text(m[1], x, y + 20);
  });
  y += 44; rule(y); y += 26;

  /* ---- Price range band ---- */
  doc.setFillColor(11, 23, 52); doc.roundedRect(M, y, W - 2 * M, 64, 12, 12, "F");
  doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(180, 195, 230);
  doc.text("ESTIMATED PRICE RANGE", M + 20, y + 24);
  doc.setFont("helvetica", "bold"); doc.setFontSize(20); doc.setTextColor(255, 255, 255);
  doc.text(money(est.priceLow) + "  –  " + money(est.priceHigh), M + 20, y + 48);
  y += 92;

  /* ---- Property information ---- */
  label("Property information", y); y += 16;
  const info = [
    ["Property type", pt],
    ["Size", est.input.size.toLocaleString() + " sq ft"],
    ["Bedrooms", String(est.input.bedrooms)],
    ["Bathrooms", String(est.input.bathrooms)],
    ["Cleaning type", est.service.name],
  ];
  info.forEach((r, i) => {
    const yy = y + i * 22;
    doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(...INK3);
    doc.text(r[0], M, yy);
    doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.setTextColor(...INK);
    doc.text(r[1], W - M, yy, { align: "right" });
    doc.setDrawColor(...LINE); doc.setLineWidth(0.6); doc.line(M, yy + 7, W - M, yy + 7);
  });
  y += info.length * 22 + 18;

  /* ---- AI reasoning ---- */
  label("AI reasoning", y); y += 18;
  doc.setFontSize(9.5);
  est.reasoning.forEach((r, i) => {
    doc.setFont("helvetica", "bold"); doc.setTextColor(...BLUE);
    doc.text(String(i + 1).padStart(2, "0"), M, y);
    doc.setTextColor(...INK); doc.text(r.t, M + 24, y);
    doc.setFont("helvetica", "normal"); doc.setTextColor(...INK3);
    const lines = doc.splitTextToSize(r.d, W - 2 * M - 24);
    doc.text(lines, M + 24, y + 14);
    y += 14 + lines.length * 12 + 12;
  });

  /* ---- Footer ---- */
  const fy = doc.internal.pageSize.getHeight() - 40;
  doc.setDrawColor(...LINE); doc.line(M, fy - 14, W - M, fy - 14);
  doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(...INK3);
  doc.text("Estimate valid for 14 days from issue · No commitment required · Generated by Rasaia Clean AI", M, fy);
  doc.text(new Date().toLocaleDateString("en-GB"), W - M, fy, { align: "right" });

  doc.save("Rasaia-Quote-" + ref + ".pdf");
}

window.generateQuotePDF = generateQuotePDF;

const WIZ_STEPS = ["Property", "Photos", "Analysis", "Quote"];

function WizardShell({ step, onExit, children, footer }) {
  const { t } = useLang();
  return (
    <div style={{ minHeight: "100vh", background: "var(--surface-2)", display: "flex", flexDirection: "column" }}>
      <header style={{ position: "sticky", top: 0, zIndex: 40, background: "rgba(255,255,255,.85)", backdropFilter: "blur(12px)", borderBottom: "1px solid var(--line)" }}>
        <div className="container row" style={{ height: 66, justifyContent: "space-between", gap: 24 }}>
          <Logo size={28} />
          <div style={{ flex: 1, maxWidth: 560, display: "flex", justifyContent: "center" }} className="wiz-steps">
            <ProgressSteps steps={WIZ_STEPS.map(s => t(s))} current={step} />
          </div>
          <div className="row gap-3">
            <LanguageToggle compact />
            <button className="btn btn-ghost btn-sm" onClick={onExit}><Icon name="close" size={15} /> {t("Exit")}</button>
          </div>
        </div>
      </header>
      <main style={{ flex: 1 }}>{children}</main>
      {footer}
      <style>{`@media(max-width:820px){.wiz-steps{display:none!important}}`}</style>
    </div>
  );
}

function Stepper({ value, onChange, min = 0, max = 10, icon, label }) {
  return (
    <div>
      <span className="field-label">{label}</span>
      <div className="row" style={{ border: "1px solid var(--line)", borderRadius: 12, overflow: "hidden", background: "var(--surface)", height: 50 }}>
        <button onClick={() => onChange(Math.max(min, value - 1))} className="step-btn" style={{ width: 48, height: "100%", color: "var(--ink-2)", fontSize: 20 }}>−</button>
        <div className="row grow" style={{ justifyContent: "center", gap: 8, borderLeft: "1px solid var(--line)", borderRight: "1px solid var(--line)", height: "100%", color: "var(--blue-600)" }}>
          <Icon name={icon} size={17} /><span style={{ fontSize: 17, fontWeight: 700, color: "var(--ink)" }}>{value}</span>
        </div>
        <button onClick={() => onChange(Math.min(max, value + 1))} className="step-btn" style={{ width: 48, height: "100%", color: "var(--ink-2)", fontSize: 18 }}>+</button>
      </div>
      <style>{`.step-btn:hover{background:var(--surface-2);color:var(--blue-600)}`}</style>
    </div>
  );
}

function OptionCard({ active, icon, title, desc, onClick }) {
  return (
    <button onClick={onClick} style={{
      textAlign: "start", padding: 18, borderRadius: 16, width: "100%",
      border: active ? "1.5px solid var(--blue-600)" : "1.5px solid var(--line)",
      background: active ? "var(--blue-50)" : "var(--surface)",
      boxShadow: active ? "0 0 0 4px var(--blue-50)" : "var(--sh-xs)",
      transition: "all .15s", cursor: "pointer",
      display: "flex", gap: 14, alignItems: desc ? "flex-start" : "center",
    }}>
      <div style={{ width: 42, height: 42, borderRadius: 11, flexShrink: 0, display: "grid", placeItems: "center",
        background: active ? "var(--blue-600)" : "var(--surface-2)", color: active ? "#fff" : "var(--ink-2)", transition: "all .15s" }}>
        <Icon name={icon} size={21} />
      </div>
      <div style={{ flex: 1 }}>
        <div className="row" style={{ justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, fontSize: 15 }}>{title}</span>
          {active && <Icon name="check" size={16} stroke={3} style={{ color: "var(--blue-600)" }} />}
        </div>
        {desc && <div className="muted" style={{ fontSize: 13, marginTop: 4, lineHeight: 1.45 }}>{desc}</div>}
      </div>
    </button>
  );
}

function PhotoUpload({ photos, onChange, onNext, onBack, onExit }) {
  const { t } = useLang();
  const [dragOver, setDragOver] = useState(false);
  const total = Object.values(photos).reduce((a, b) => a + b, 0);
  const addTo = (room, n = 1) => onChange({ ...photos, [room]: Math.min(6, (photos[room] || 0) + n) });
  const dropAll = () => onChange(Object.fromEntries(Rasaia.PHOTO_ROOMS.map(r => [r.key, Math.min(6, (photos[r.key] || 0) + 1)])));

  return (
    <WizardShell step={1} onExit={onExit}>
      <div className="container" style={{ maxWidth: 820, padding: "44px 24px 120px" }}>
        <div className="fade-up">
          <div className="eyebrow">{t("Step 2 of 4")}</div>
          <h1 className="t-h1" style={{ marginTop: 10 }}>{t("Add photos for a sharper estimate")}</h1>
          <p className="lead" style={{ marginTop: 10 }}>{t("Optional, but photos let the AI assess real soiling and complexity. Drag & drop or click to add.")}</p>
        </div>

        {/* Dropzone */}
        <div className="fade-up" onClick={dropAll}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => { e.preventDefault(); setDragOver(false); dropAll(); }}
          style={{ marginTop: 24, borderRadius: 18, padding: "38px 24px", textAlign: "center", cursor: "pointer",
            border: `2px dashed ${dragOver ? "var(--blue-500)" : "#C5D0E4"}`, background: dragOver ? "var(--blue-50)" : "var(--surface)", transition: "all .15s" }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, margin: "0 auto", background: "var(--blue-50)", color: "var(--blue-600)", display: "grid", placeItems: "center" }}><Icon name="upload" size={26} /></div>
          <div style={{ fontWeight: 700, fontSize: 16, marginTop: 16 }}>{t("Drag & drop photos here")}</div>
          <div className="muted" style={{ fontSize: 13.5, marginTop: 5 }}>{t("or click to browse · JPG, PNG, HEIC up to 20MB")}</div>
        </div>

        {/* Per-room */}
        <div className="col gap-5" style={{ marginTop: 28 }}>
          {Rasaia.PHOTO_ROOMS.map((room, ri) => (
            <div key={room.key} className="card fade-up" style={{ padding: 20, animationDelay: `${ri * .04}s` }}>
              <div className="row" style={{ justifyContent: "space-between", marginBottom: 14 }}>
                <div>
                  <div className="row gap-2"><span style={{ fontWeight: 700, fontSize: 15 }}>{t(room.label)}</span>{photos[room.key] > 0 && <Badge kind="green">{photos[room.key]}</Badge>}</div>
                  <div className="muted" style={{ fontSize: 12.5, marginTop: 2 }}>{t(room.hint)}</div>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(96px, 1fr))", gap: 10 }}>
                {Array.from({ length: photos[room.key] || 0 }).map((_, i) => <PhotoTile key={i} filled label={t(room.label)} />)}
                {(photos[room.key] || 0) < 6 && <PhotoTile onClick={() => addTo(room.key)} />}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ position: "sticky", bottom: 0, background: "rgba(255,255,255,.9)", backdropFilter: "blur(12px)", borderTop: "1px solid var(--line)" }}>
        <div className="container row" style={{ maxWidth: 820, justifyContent: "space-between", padding: "16px 24px" }}>

/* -------------------- Screen 4: AI Analysis -------------------- */
function AIAnalysis({ onDone, onExit }) {
  const { t } = useLang();
  const STAGES = [
    { icon: "doc", label: "Reviewing property information", detail: "Type, size, rooms & cleaning scope" },
    { icon: "image", label: "Assessing cleaning complexity", detail: "Reading photo signals & soiling levels" },
    { icon: "users", label: "Estimating labor requirements", detail: "Hours, team size & scheduling" },
    { icon: "money", label: "Calculating quotation", detail: "Rate model & property multipliers" },
    { icon: "sparkle", label: "Generating recommendations", detail: "Service match & confidence scoring" },
  ];
  const [done, setDone] = useState(-1);
  const [active, setActive] = useState(0);
  useEffect(() => {
    let i = 0;
    setActive(0);
    const tick = () => {
      setDone(i);
      i++;
      if (i < STAGES.length) { setActive(i); setTimeout(tick, 820); }
      else setTimeout(() => onDone(), 700);
    };
    const tm = setTimeout(tick, 700);
    return () => clearTimeout(tm);
  }, []);
  const pct = Math.round(((done + 1) / STAGES.length) * 100);

  return (
    <WizardShell step={2} onExit={onExit}>
      <div className="container" style={{ maxWidth: 620, padding: "60px 24px 100px", textAlign: "center" }}>
        <div className="scale-in" style={{ width: 92, height: 92, margin: "0 auto", borderRadius: 26, position: "relative",
          background: "linear-gradient(145deg, var(--blue-500), var(--ai-500))", display: "grid", placeItems: "center", color: "#fff",
          boxShadow: "0 18px 40px rgba(35,71,217,.4)", animation: "ringPulse 2s infinite" }}>
          <Icon name="sparkle" size={44} stroke={0} style={{ fill: "#fff", stroke: "none" }} />
          <div style={{ position: "absolute", inset: -6, borderRadius: 30, border: "2px solid var(--blue-200)", borderTopColor: "transparent", animation: "spin 1.1s linear infinite" }} />
        </div>
        <h1 className="t-h2" style={{ marginTop: 28 }}>{t("Generating your AI quotation")}</h1>
        <p className="muted" style={{ marginTop: 8 }}>{t("Analyzing your property — this takes a few seconds.")}</p>

        {/* progress bar */}
        <div style={{ height: 7, background: "var(--surface-3)", borderRadius: 99, marginTop: 28, overflow: "hidden" }}>
          <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg, var(--blue-500), var(--ai-500))", borderRadius: 99, transition: "width .6s cubic-bezier(.3,.8,.3,1)" }} />
        </div>
        <div className="mono muted" style={{ fontSize: 11.5, marginTop: 8, textAlign: "end" }}>{pct}%</div>

        <div className="card" style={{ padding: 10, marginTop: 22, textAlign: "start" }}>
          {STAGES.map((s, i) => {
            const isDone = i <= done, isActive = i === active && !isDone;
            return (
              <div key={i} className="row gap-3" style={{ padding: "13px 14px", borderRadius: 12, background: isActive ? "var(--blue-50)" : "transparent", transition: "background .3s", opacity: i <= active || isDone ? 1 : .42 }}>
                <div style={{ width: 34, height: 34, borderRadius: 10, flexShrink: 0, display: "grid", placeItems: "center", transition: "all .3s",
                  background: isDone ? "var(--green-100)" : isActive ? "var(--blue-600)" : "var(--surface-3)",
                  color: isDone ? "var(--green-600)" : isActive ? "#fff" : "var(--ink-3)" }}>
                  {isDone ? <Icon name="check" size={17} stroke={3} style={{ animation: "popCheck .3s" }} />
                    : isActive ? <div style={{ width: 15, height: 15, borderRadius: "50%", border: "2.5px solid rgba(255,255,255,.45)", borderTopColor: "#fff", animation: "spin .8s linear infinite" }} />
                    : <Icon name={s.icon} size={17} />}
                </div>
                <div className="grow">
                  <div style={{ fontWeight: 600, fontSize: 14.5, color: isActive || isDone ? "var(--ink)" : "var(--ink-2)" }}>{t(s.label)}</div>
                  <div className="muted" style={{ fontSize: 12.5, marginTop: 1 }}>{t(s.detail)}</div>
                </div>

function mdBold(text) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => p.startsWith("**") ? <strong key={i} style={{ fontWeight: 700, color: "var(--ink)" }}>{p.slice(2, -2)}</strong> : <React.Fragment key={i}>{p}</React.Fragment>);
}

/* -------------------- AI Assistant drawer -------------------- */
function AssistantDrawer({ est, open, onClose }) {
  const { t, isRTL } = useLang();
  const hidden = isRTL ? "translateX(-102%)" : "translateX(102%)";
  const SUGGESTIONS = [t("Why was this service recommended?"), t("Why do I need") + " " + est.team + " " + t("cleaners?"), t("How was the estimate calculated?"), t("Can I reduce the estimate?")];
  const [msgs, setMsgs] = useState([{ role: "ai", text: `Hi! I'm your Rasaia quote assistant. I generated your **${est.service.name}** estimate of ${Rasaia.fmt(est.priceLow)}–${Rasaia.fmt(est.priceHigh)}. Ask me anything about how I arrived at it.` }]);
  const [typing, setTyping] = useState(false);
  const [text, setText] = useState("");
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [msgs, typing]);

  const ask = (q) => {
    if (!q.trim()) return;
    setMsgs(m => [...m, { role: "user", text: q }]);
    setText(""); setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMsgs(m => [...m, { role: "ai", text: Rasaia.assistantAnswer(q, est) }]);
    }, 1100);
  };

  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(11,23,52,.4)", backdropFilter: "blur(2px)", zIndex: 90, opacity: open ? 1 : 0, pointerEvents: open ? "auto" : "none" }} />

        {/* header */}
        <div style={{ padding: "18px 20px", borderBottom: "1px solid var(--line)", background: "linear-gradient(135deg, var(--blue-700), var(--navy))", color: "#fff" }}>
          <div className="row" style={{ justifyContent: "space-between" }}>
            <div className="row gap-3">
              <div style={{ width: 38, height: 38, borderRadius: 11, background: "rgba(255,255,255,.15)", display: "grid", placeItems: "center" }}><Icon name="sparkle" size={20} stroke={0} style={{ fill: "#fff", stroke: "none" }} /></div>
              <div><div style={{ fontWeight: 700, fontSize: 15.5 }}>{t("Quote Assistant")}</div><div style={{ fontSize: 12, color: "rgba(255,255,255,.7)" }}>{t("AI · always available")}</div></div>

          </div>
        </div>
        {/* messages */}
        <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: 20, display: "flex", flexDirection: "column", gap: 14, background: "var(--surface-2)" }}>
          {msgs.map((m, i) => (
            <div key={i} style={{ alignSelf: m.role === "user" ? "flex-end" : "flex-start", maxWidth: "86%" }} className="fade-up">
              <div style={{ padding: "12px 15px", borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                background: m.role === "user" ? "var(--blue-600)" : "var(--surface)", color: m.role === "user" ? "#fff" : "var(--ink)",
                border: m.role === "user" ? "none" : "1px solid var(--line)", fontSize: 14, lineHeight: 1.55, boxShadow: "var(--sh-xs)" }}>
                {m.role === "ai" ? mdBold(m.text) : m.text}
              </div>
            </div>
          ))}
          {typing && (
            <div style={{ alignSelf: "flex-start" }}>
              <div className="row gap-2" style={{ padding: "14px 16px", borderRadius: "16px 16px 16px 4px", background: "var(--surface)", border: "1px solid var(--line)" }}>
                {[0, 1, 2].map(d => <span key={d} style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--blue-400)", animation: `pulse 1s ${d * .15}s infinite` }} />)}

            </div>
          )}
        </div>
        {/* suggestions + input */}
        <div style={{ padding: 16, borderTop: "1px solid var(--line)", background: "var(--surface)" }}>
          <div className="row wrap gap-2" style={{ marginBottom: 12 }}>

              <button key={s} onClick={() => ask(s)} style={{ fontSize: 12.5, fontWeight: 600, color: "var(--blue-700)", background: "var(--blue-50)", padding: "7px 12px", borderRadius: 99, transition: "background .15s" }}
                onMouseEnter={e => e.currentTarget.style.background = "var(--blue-100)"} onMouseLeave={e => e.currentTarget.style.background = "var(--blue-50)"}>{s}</button>
            ))}
          </div>

            <input className="input" style={{ height: 46 }} placeholder={t("Ask about your quote…")} value={text} onChange={e => setText(e.target.value)} />
            <button type="submit" className="btn btn-primary" style={{ width: 46, padding: 0, flexShrink: 0 }}><Icon name="send" size={18} /></button>
          </form>
        </div>

  const submit = (e) => {
    e.preventDefault();
    const err = {};
    if (!form.name.trim()) err.name = t("This field is required");

/* ---------------- Charts ---------------- */
function BarTrend({ data }) {
  const max = Math.max(...data);
  const labels = ["J","F","M","A","M","J","J","A","S","O","N","D"];
  return (
    <div className="row" style={{ alignItems: "flex-end", gap: 8, height: 170, paddingTop: 8 }}>
      {data.map((d, i) => (
        <div key={i} className="col" style={{ flex: 1, alignItems: "center", gap: 8, height: "100%", justifyContent: "flex-end" }}>
          <div title={d} style={{ width: "100%", maxWidth: 30, height: `${(d / max) * 100}%`, borderRadius: "6px 6px 3px 3px",
            background: i === data.length - 1 ? "linear-gradient(180deg, var(--blue-500), var(--blue-700))" : "var(--blue-100)" }} />
          <span className="mono muted" style={{ fontSize: 10 }}>{labels[i]}</span>
        </div>
      ))}
    </div>
  );
}

function Donut({ data, size = 168 }) {
  const { t } = useLang();
  const r = (size - 26) / 2, c = 2 * Math.PI * r, cx = size / 2;
  let off = 0;
  const total = data.reduce((a, b) => a + b.pct, 0);
  return (
    <div className="row gap-5" style={{ alignItems: "center", flexWrap: "wrap" }}>
      <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
        <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
          {data.map((d, i) => {
            const len = (d.pct / total) * c;
            const seg = <circle key={i} cx={cx} cy={cx} r={r} fill="none" stroke={d.color} strokeWidth="14" strokeLinecap="round" strokeDasharray={`${Math.max(0, len - 4)} ${c}`} strokeDashoffset={-off} style={{ transition: "stroke-dasharray .6s" }} />;
            off += len; return seg;
          })}
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center" }}>
          <div><div style={{ fontSize: 26, fontWeight: 800 }}>{data[0].pct}%</div><div className="muted" style={{ fontSize: 11 }}>{t(data[0].name).split(" ")[0]}</div></div>
        </div>
      </div>
      <div className="col gap-3" style={{ flex: 1, minWidth: 180 }}>
        {data.map(d => (
          <div key={d.name} className="row" style={{ justifyContent: "space-between" }}>
            <span className="row gap-2" style={{ fontSize: 13, fontWeight: 600 }}><span style={{ width: 10, height: 10, borderRadius: 3, background: d.color }} /> {t(d.name)}</span>
            <span className="mono" style={{ fontSize: 13, fontWeight: 600 }}>{d.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Requests({ tab, setTab, onExit, onOpenRequest }) {
  const { t } = useLang();
  const [filter, setFilter] = useState("all");
  const [q, setQ] = useState("");
  const filters = [
    { key: "all", label: t("All") }, { key: "pending", label: t("Pending") }, { key: "confirmed", label: t("Confirmed") },
    { key: "review", label: t("In review") }, { key: "rejected", label: t("Rejected") },
  ];
  const counts = Rasaia.REQUESTS.reduce((a, r) => { a[r.status] = (a[r.status] || 0) + 1; return a; }, {});

  return (

function QuoteManagement({ tab, setTab, onExit, request, onBack }) {
  const { t } = useLang();
  const base = request || Rasaia.REQUESTS[0];
  const est = Rasaia.estimate({
    propertyType: PROP_TO_KEY[base.prop] || "apartment",
    size: base.size, bedrooms: base.beds, bathrooms: base.baths,
    cleaningType: SVC_TO_KEY[base.svc] || "deep", photoCount: 5,
  });
  const [status, setStatus] = useState(base.status);
  const [editing, setEditing] = useState(false);
  const [price, setPrice] = useState(base.price);
  const [team, setTeam] = useState(est.team);
  const [toast, setToast] = useState(null);
  const st = Rasaia.STATUS_META[status];

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };
  const act = (next, msg) => { setStatus(next); setEditing(false); flash(msg); };

  return (
    <CompanyShell tab={tab} setTab={setTab} onExit={onExit} title={t("Quote Management")} subtitle={t("Review, edit and decide on AI-generated quotes")}
      action={<button className="btn btn-ghost btn-sm" onClick={onBack}><Icon name="arrowLeft" size={15} /> {t("All requests")}</button>}>

      {toast && <div className="scale-in" style={{ position: "fixed", top: 84, insetInlineEnd: 28, zIndex: 80, background: "var(--navy)", color: "#fff", padding: "13px 18px", borderRadius: 12, boxShadow: "var(--sh-lg)", fontSize: 14, fontWeight: 600 }} ><span className="row gap-2"><Icon name="check" size={16} stroke={3} /> {toast}</span></div>}

      <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 20, alignItems: "start" }} className="qm-grid">
        {/* LEFT: quote detail */}
        <div className="col gap-5">
          <div className="card" style={{ padding: 0, overflow: "hidden" }}>
            <div className="row" style={{ justifyContent: "space-between", padding: "22px 24px", borderBottom: "1px solid var(--line)", flexWrap: "wrap", gap: 12 }}>
              <div className="row gap-3">
                <div style={{ width: 46, height: 46, borderRadius: "50%", background: "linear-gradient(145deg,var(--blue-500),var(--ai-500))", color: "#fff", display: "grid", placeItems: "center", fontWeight: 700 }}>{base.name.split(" ").map(n => n[0]).join("")}</div>
                <div><div style={{ fontWeight: 800, fontSize: 17 }}>{base.name}</div><div className="mono muted" style={{ fontSize: 12 }}>{base.id} · {base.area}</div></div>
              </div>
              <span className={`badge ${st.cls}`} style={{ height: "fit-content" }}><span className="dot" style={{ background: "currentColor" }} />{t(st.label)}</span>
            </div>

            {/* headline */}
            <div style={{ padding: 24 }}>
              <div className="row" style={{ justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
                <div>
                  <div className="muted" style={{ fontSize: 13 }}>{t("Recommended service")}</div>
                  <div className="t-h2" style={{ marginTop: 4 }}>{t(est.service.name)}</div>
                </div>
                <ConfidenceRing value={est.confidence} size={96} />
              </div>

              {/* editable metrics */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginTop: 22 }} className="g3">
                <div style={{ background: "var(--surface-2)", borderRadius: 12, padding: "14px 16px" }}>
                  <div className="muted mono" style={{ fontSize: 10.5, letterSpacing: ".06em" }}>{t("QUOTE PRICE")}</div>
                  {editing ? <input className="input" style={{ height: 40, marginTop: 6, fontWeight: 700 }} type="number" value={price} onChange={e => setPrice(+e.target.value)} />
                    : <div style={{ fontSize: 22, fontWeight: 800, marginTop: 4 }} className="keep-ltr">{Rasaia.fmt(price)}</div>}
                </div>
                <div style={{ background: "var(--surface-2)", borderRadius: 12, padding: "14px 16px" }}>
                  <div className="muted mono" style={{ fontSize: 10.5, letterSpacing: ".06em" }}>{t("DURATION")}</div>
                  <div style={{ fontSize: 22, fontWeight: 800, marginTop: 4 }}>~{est.durationHours}h</div>
                </div>
                <div style={{ background: "var(--surface-2)", borderRadius: 12, padding: "14px 16px" }}>
                  <div className="muted mono" style={{ fontSize: 10.5, letterSpacing: ".06em" }}>{t("TEAM SIZE")}</div>
                  {editing ? (
                    <div className="row gap-2" style={{ marginTop: 6 }}>
                      <button className="btn btn-ghost btn-sm" style={{ width: 32, padding: 0 }} onClick={() => setTeam(Math.max(1, team - 1))}>−</button>
                      <span style={{ fontSize: 20, fontWeight: 800 }}>{team}</span>
                      <button className="btn btn-ghost btn-sm" style={{ width: 32, padding: 0 }} onClick={() => setTeam(team + 1)}>+</button>
                    </div>
                  ) : <div style={{ fontSize: 22, fontWeight: 800, marginTop: 4 }}>{team}</div>}
                </div>
              </div>
              {editing && <div className="row gap-2" style={{ marginTop: 14, fontSize: 12.5, color: "var(--amber-600)" }}><Icon name="edit" size={15} /> {t("Editing overrides the AI estimate. Changes are logged.")}</div>}
            </div>

            {/* AI reasoning */}
            <div style={{ padding: "0 24px 24px" }}>
              <div className="row gap-2" style={{ marginBottom: 12 }}><Icon name="sparkle" size={16} style={{ color: "var(--ai-500)" }} /><span style={{ fontWeight: 700, fontSize: 14 }}>{t("AI reasoning")}</span></div>
              <div className="col gap-2">
                {est.reasoning.map((r, i) => (
                  <div key={i} className="row gap-3" style={{ padding: "12px 14px", background: "var(--surface-2)", borderRadius: 10 }}>
                    <span className="mono" style={{ fontSize: 11, color: "var(--blue-600)", fontWeight: 700, marginTop: 2 }}>{String(i + 1).padStart(2, "0")}</span>
                    <div><div style={{ fontWeight: 700, fontSize: 13.5 }}>{t(r.t)}</div><div className="muted" style={{ fontSize: 12.5, lineHeight: 1.5, marginTop: 2 }}>{r.d}</div></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* RIGHT: actions + property */}
        <div className="col gap-5" style={{ position: "sticky", top: 86 }}>
          <div className="card" style={{ padding: 22 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>{t("Decision")}</h3>
            <div className="col gap-3">
              {!editing ? (
                <>
                  <button className="btn btn-block" style={{ background: "var(--green-600)", color: "#fff" }} onClick={() => act("confirmed", t("Quote approved & confirmed"))}><Icon name="check" size={17} stroke={3} /> {t("Approve quote")}</button>
                  <button className="btn btn-ghost btn-block" onClick={() => setEditing(true)}><Icon name="edit" size={16} /> {t("Edit quote")}</button>
                  <button className="btn btn-block" style={{ background: "var(--red-100)", color: "var(--red-600)" }} onClick={() => act("rejected", t("Quote rejected"))}><Icon name="close" size={16} /> {t("Reject quote")}</button>
                </>
              ) : (
                <>
                  <button className="btn btn-primary btn-block" onClick={() => act(status === "rejected" ? "review" : status, t("Quote updated"))}><Icon name="check" size={16} stroke={3} /> {t("Save changes")}</button>
                  <button className="btn btn-ghost btn-block" onClick={() => { setEditing(false); setPrice(base.price); setTeam(est.team); }}>{t("Cancel")}</button>
                </>
              )}
            </div>
            <div className="muted" style={{ fontSize: 12, marginTop: 14, lineHeight: 1.5 }}>{t("Approving notifies the customer and books the job. Rejecting sends a polite decline.")}</div>
          </div>

          <div className="card" style={{ padding: 22 }}>
            <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>{t("Property details")}</h3>
            <div className="col">
              {[["pin", t("Location"), base.area], ["building", t("Type"), t(base.prop)], ["ruler", t("Size"), base.size.toLocaleString() + " " + t("sq ft")], ["bed", t("Bedrooms"), base.beds], ["bath", t("Bathrooms"), base.baths], ["clock", t("Submitted"), base.when]].map((row, i) => (
                <div key={row[1]} className="row" style={{ justifyContent: "space-between", padding: "10px 0", borderTop: i ? "1px solid var(--line-2)" : "none" }}>
                  <span className="row gap-2 muted" style={{ fontSize: 13 }}><Icon name={row[0]} size={15} style={{ color: "var(--blue-500)" }} /> {row[1]}</span>
                  <span style={{ fontSize: 13, fontWeight: 700 }}>{row[2]}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      <style>{`@media(max-width:980px){.qm-grid{grid-template-columns:1fr!important}.qm-grid>div:last-child{position:static!important}}`}</style>
    </CompanyShell>
  );
}

Object.assign(window, { Requests, QuoteManagement });

/* ============================================================
   Rasaia Clean AI — App shell & router
   ============================================================ */

function App() {
  const [view, setView] = useState("landing");
  const [companyTab, setCompanyTab] = useState("dashboard");
  const [selected, setSelected] = useState(null);

  const [quoteInput, setQuoteInput] = useState({ propertyType: "apartment", size: 1150, bedrooms: 2, bathrooms: 2, cleaningType: "deep" });
  const [photos, setPhotos] = useState({ living: 0, kitchen: 0, bathroom: 0, bedroom: 0, extra: 0 });
  const [est, setEst] = useState(null);
  const [submitMode, setSubmitMode] = useState("callback");

  // scroll to top on view change
  useEffect(() => { window.scrollTo(0, 0); document.querySelector("main")?.scrollTo?.(0, 0); }, [view, companyTab]);

  const goCompany = (tab = "dashboard") => { setCompanyTab(tab); setView("company"); };
  const openRequest = (r) => { setSelected(r); setCompanyTab("quotes"); };

  // Customer flow
  if (view === "landing")
    return <Landing onStart={() => setView("property")} onCompany={() => goCompany("dashboard")} />;

  if (view === "property")
    return <PropertyInfo value={quoteInput} onChange={setQuoteInput} onExit={() => setView("landing")} onNext={() => setView("photos")} />;

  if (view === "photos")
    return <PhotoUpload photos={photos} onChange={setPhotos} onBack={() => setView("property")} onExit={() => setView("landing")}
      onNext={(total) => { setEst(Rasaia.estimate({ ...quoteInput, photoCount: total })); setView("analysis"); }} />;

  if (view === "analysis")
    return <AIAnalysis onExit={() => setView("landing")} onDone={() => setView("quote")} />;

  if (view === "quote")
    return <QuoteResults est={est} onExit={() => setView("landing")} onBack={() => setView("property")}
      onSubmit={(mode) => { setSubmitMode(mode); setView("confirm"); }} />;

  if (view === "confirm")
    return <Confirmation est={est} mode={submitMode} onHome={() => setView("landing")} onCompany={() => goCompany("dashboard")} />;

  // Company portal
  if (view === "company") {
    const shared = { tab: companyTab, setTab: setCompanyTab, onExit: () => setView("landing") };
    if (companyTab === "dashboard") return <Dashboard {...shared} onOpenRequest={openRequest} />;
    if (companyTab === "requests") return <Requests {...shared} onOpenRequest={openRequest} />;
    if (companyTab === "quotes") return <QuoteManagement {...shared} request={selected} onBack={() => setCompanyTab("requests")} />;
    if (companyTab === "insights") return <Insights {...shared} />;
  }

  return <Landing onStart={() => setView("property")} onCompany={() => goCompany("dashboard")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <LangProvider><App /></LangProvider>
);

  </script>
